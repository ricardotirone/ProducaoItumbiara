<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Gestão - SENAI Itumbiara</title>
    <style>
        :root {
            --senai-blue: #005595;
            --senai-red: #da291c;
            --gray-light: #f4f7f6;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden; /* Evita scroll na página principal */
        }

        /* CABEÇALHO (Borda Preta na sua imagem) */
        header {
            background-color: #fff;
            border-bottom: 4px solid #000;
            height: 80px;
            display: flex;
            align-items: center;
            padding: 0 30px;
            justify-content: space-between;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo-placeholder {
            height: 50px;
            width: 150px;
            /* Substitua a URL abaixo pelo caminho da imagem do logo */
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/8/8c/SENAI_Logo.svg');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .header-title {
            font-weight: bold;
            color: #333;
            font-size: 1.1rem;
            border-left: 2px solid #ccc;
            padding-left: 20px;
        }

        /* BOTÕES DO CABEÇALHO */
        .nav-buttons {
            display: flex;
            gap: 15px;
        }

        .nav-btn {
            background: #fff;
            border: 2px solid #000;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .nav-btn:hover {
            background: #000;
            color: #fff;
        }

        .nav-btn.active {
            background: var(--senai-blue);
            color: #fff;
            border-color: var(--senai-blue);
        }

        /* ÁREA DA PÁGINA (Borda Vermelha na sua imagem) */
        main {
            height: calc(100% - 84px); /* Desconta o header */
            padding: 15px;
            background-color: var(--gray-light);
            box-sizing: border-box;
        }

        .content-frame {
            width: 100%;
            height: 100%;
            border: 3px solid var(--senai-red); /* Representando a borda vermelha da imagem */
            border-radius: 8px;
            background: #fff;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <div class="logo-placeholder"></div>
        <div class="header-title">
            Unidade Itumbiara <br>
            <small style="font-weight: normal; color: #666;">Coordenação de Tecnologia e Inovação</small>
        </div>
    </div>

    <nav class="nav-buttons">
        <button class="nav-btn active" onclick="carregarPagina('precificacao.html', this)">Precificação</button>
        <button class="nav-btn" onclick="carregarPagina('viabilidade.html', this)">Viabilidade (PE)</button>
        <button class="nav-btn" onclick="carregarPagina('cronograma.html', this)">Cronograma</button>
    </nav>
</header>

<main>
    <div class="content-frame">
        <iframe src="precificacao.html" id="frame-conteudo"></iframe>
    </div>
</main>

<script>
    function carregarPagina(url, elemento) {
        // Altera o SRC do iframe para carregar o novo arquivo
        document.getElementById('frame-conteudo').src = url;

        // Atualiza a aparência dos botões
        const botoes = document.querySelectorAll('.nav-btn');
        botoes.forEach(btn => btn.classList.remove('active'));
        elemento.classList.add('active');
    }
</script>

</body>
</html>
